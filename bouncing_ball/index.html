<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="/assets/js/p5.js"></script>
    <script src="/assets/js/p5.sound.min.js"></script>
    <link rel="stylesheet" href="/styles.css">
    <meta charset="utf-8">
    <title>Bouncing Ball</title>
  </head>
  <body>
    <input id="ballx" type="number" placeholder="Ball starting x coordinate">
    <input id="bally" type="number" placeholder="Ball starting y coordinate">
    <br>
    <input id="ballxspeed" type="number" placeholder="Ball x speed">
    <input id="ballyspeed" type="number" placeholder="Ball y speed">
    <br>
    <button id="start">Start</button>
    <button id="restart">Restart</button>
    <br>
    <h4 id="output"></h4>
    <br>
    <h4 id="hits"></h4>
    <br>
    <h4 id="xvelocity"></h4>
    <br>
    <h4 id="yvelocity"></h4>
    <br>
    <h4 id="ballcoords"></h4>
    <script src="sketch.js"></script>
  </body>
</html>
